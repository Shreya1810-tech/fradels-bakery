<!DOCTYPE html>
<html>

<head>
    <title>Admin - Manage Products</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #faebf4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fffaf0;
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #f48fb1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 30px;
        }

        th,
        td {
            border-bottom: 1px solid #f8bbd0;
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
            color: #5d4037;
        }

        th {
            background: #fce4ec;
        }

        .back-link {
            margin-bottom: 10px;
            display: inline-block;
            text-decoration: none;
            color: #e97aa9;
            font-weight: bold;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            background: #f48fb1;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(244, 143, 177, 0.3);
            transition: background 0.2s;
        }

        .btn:hover {
            background: #f06292;
        }

        .btn-danger {
            background: #e57373;
            box-shadow: 0 4px 10px rgba(229, 115, 115, 0.3);
        }

        .btn-danger:hover {
            background: #ef5350;
        }

        .add-form-container {
            background: #fffdfc;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #fce4ec;
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: #8d6e63;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 2px solid #f8bbd0;
            border-radius: 6px;
            box-sizing: border-box;
            color: #5d4037;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .action-cell {
            white-space: nowrap;
        }

        .edit-input {
            width: 80px;
            padding: 4px;
            border: 1px solid #f8bbd0;
            border-radius: 4px;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="Admin_home.html" class="back-link">← Back to Admin Home</a>
        <h2>Manage Products</h2>

        <div id="productsArea"></div>

        <div class="add-form-container">
            <h3 style="color: #f48fb1; margin-top: 0;">Add New Product</h3>
            <div class="form-group">
                <label>Product ID (unique snippet like 'red_velvet')</label>
                <input type="text" id="newId" placeholder="e.g. matcha_cake">
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="newName" placeholder="e.g. Matcha Cake 1/2kg">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="newDesc" placeholder="e.g. Delicious matcha flavored cake."></textarea>
            </div>
            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" id="newPrice" placeholder="e.g. 500" min="1">
            </div>
            <div class="form-group">
                <label>Image URL/Filename</label>
                <input type="text" id="newImg" placeholder="e.g. matchacake.jpg">
            </div>
            <button class="btn" onclick="addProduct()">Add Product</button>
            <p id="addMsg" style="color: #d81b60; font-weight: bold; margin-top: 10px;"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, setDoc, doc, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2NeomlNHM7jTFQXoCIt3xR3L1rKGWjoc",
            authDomain: "bakery-site-3b5a3.firebaseapp.com",
            projectId: "bakery-site-3b5a3",
            storageBucket: "bakery-site-3b5a3.firebasestorage.app",
            messagingSenderId: "35232571735",
            appId: "1:35232571735:web:8a9c607dc990802d135e12"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const defaultProducts = [
            { id: 'brownie', name: 'Assorted Brownies 1/2kg', desc: 'Filled with gooey choco-chips', price: 400, image: 'brownie.jpg' },
            { id: 'cookie', name: 'Choco-chip cookies 1/2kg', desc: 'Filled with gooey center, hard on the outside', price: 350, image: 'cookie.jpg' },
            { id: 'biscoff', name: 'Biscoff Cheesecake 1/2kg', desc: 'A layer of biscoff base, a thick creamy cheese layer, a layer of biscoff spread ganache', price: 650, image: 'biscoffcheesecake.jpg' },
            { id: 'oatmeal', name: 'Oatmeal Raisin Cookies 1/2kg', desc: 'Chewy cookies, chewy raisins, chewy oatmeal!!', price: 320, image: 'oatmealcookies.jpg' },
            { id: 'tiramisu', name: 'Tiramisu 1/2kg', desc: 'Fine balance of bitter and sweet~', price: 550, image: 'tiramisu.jpg' },
            { id: 'mango_donuts', name: 'Mango Donuts 6pcs', desc: 'Soft and chewy donuts, with a delicious mango puree!', price: 280, image: 'md.jpg' },
            { id: 'mini_pie', name: 'Assorted Mini Pie 1/2kg', desc: 'Filled with creamy center, topped with fresh fruits :)', price: 500, image: 'spie.jpg' },
            { id: 'red_velvet', name: 'Red Velvet Cake 1/2kg', desc: 'Lush red color on the outside, rich chocolate flavor inside!', price: 600, image: 'redvelc.jpg' }
        ];

        async function getProducts() {
            const productsData = [];
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                if (querySnapshot.empty) {
                    // Seed default products if database is entirely empty
                    for (const p of defaultProducts) {
                        await setDoc(doc(db, "products", p.id), p);
                        productsData.push(p);
                    }
                } else {
                    querySnapshot.forEach((doc) => {
                        productsData.push({ id: doc.id, ...doc.data() });
                    });
                }
            } catch (e) {
                console.error("Error fetching products:", e);
                document.getElementById("productsArea").innerHTML = "<p>Error loading database. Make sure your Firebase rules allow reading.</p>";
            }
            return productsData;
        }

        async function loadProductsTable() {
            const products = await getProducts();
            const area = document.getElementById("productsArea");

            if (products.length === 0) {
                area.innerHTML = '<p>No products available.</p>';
                return;
            }

            let html = `
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Description</th>
            <th>Price (₹)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
    `;

            products.forEach((p, index) => {
                const safeId = p.id.replace(/'/g, "\\'");
                html += `
        <tr>
          <td><img src="${p.image}" alt="${p.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"></td>
          <td>${p.name} <br><small style="color: #aaa;">(${p.id})</small></td>
          <td>${p.desc}</td>
          <td>
            ₹<input type="number" id="price-${safeId}" class="edit-input" value="${p.price}" min="1">
          </td>
          <td class="action-cell">
            <button class="btn update-btn" data-id="${safeId}">Save</button>
            <button class="btn btn-danger delete-btn" data-id="${safeId}">Delete</button>
          </td>
        </tr>
      `;
            });

            html += `
        </tbody>
      </table>
    `;
            area.innerHTML = html;

            // Attach event listeners for dynamic buttons since we're in a module script
            document.querySelectorAll('.update-btn').forEach(btn => {
                btn.addEventListener('click', () => updatePrice(btn.getAttribute('data-id')));
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', () => deleteProduct(btn.getAttribute('data-id')));
            });
        }

        async function addProduct() {
            const id = document.getElementById("newId").value.trim();
            const name = document.getElementById("newName").value.trim();
            const desc = document.getElementById("newDesc").value.trim();
            const priceStr = document.getElementById("newPrice").value.trim();
            const image = document.getElementById("newImg").value.trim();
            const msg = document.getElementById("addMsg");

            if (!id || !name || !priceStr || !image) {
                msg.innerText = "Please fill in all required fields (ID, Name, Price, Image).";
                msg.style.color = "#d81b60";
                return;
            }

            const price = parseFloat(priceStr);
            if (isNaN(price) || price <= 0) {
                msg.innerText = "Please enter a valid price.";
                msg.style.color = "#d81b60";
                return;
            }

            try {
                // Check if product with this ID already exists
                const productDoc = await getDocs(collection(db, "products"));
                const existingProduct = productDoc.docs.find(doc => doc.id === id);
                if (existingProduct) {
                    msg.innerText = "Error: Product ID already exists.";
                    msg.style.color = "#d81b60";
                    return;
                }

                await setDoc(doc(db, "products", id), { name, desc, price, image });

                // clear inputs
                document.getElementById("newId").value = '';
                document.getElementById("newName").value = '';
                document.getElementById("newDesc").value = '';
                document.getElementById("newPrice").value = '';
                document.getElementById("newImg").value = '';

                msg.innerText = "Product added successfully!";
                msg.style.color = "#4CAF50";
                setTimeout(() => { msg.innerText = ""; }, 3000);

                loadProductsTable();
            } catch (e) {
                msg.innerText = "Error: " + e.message;
                msg.style.color = "#d81b60";
            }
        }

        window.addProduct = addProduct; // Expose globally for the onclick attribute on the "Add" button

        async function updatePrice(id) {
            const newPriceVal = document.getElementById(`price-${id}`).value;
            const newPrice = parseFloat(newPriceVal);
            if (!isNaN(newPrice) && newPrice > 0) {
                try {
                    await updateDoc(doc(db, "products", id), {
                        price: newPrice
                    });
                    alert("Price updated!");
                    loadProductsTable();
                } catch (e) {
                    alert("Error updating price: " + e.message);
                }
            } else {
                alert("Invalid price.");
            }
        }

        async function deleteProduct(id) {
            if (!confirm("Are you sure you want to delete this product?")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                loadProductsTable();
            } catch (e) {
                alert("Error deleting product.");
            }
        }

        // Load table on start
        loadProductsTable();
    </script>
</body>

</html>
