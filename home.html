<!DOCTYPE html>
<html>

<head>
  <title>Fradels Bakers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Pacifico', cursive;
      background: #fff5f8;
      /* Soft cafe blush background */
      overflow: hidden;
    }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: #fffaf0;
      /* Warm creme */
      border-bottom: 1px solid #f8bbd0;
      box-shadow: 0 4px 12px rgba(248, 187, 208, 0.4);
    }

    @import url('https://fonts.cdnfonts.com/css/baguet-script');

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      color: #4b1535;
      /* Mocha brown */
      font-size: 1.2rem;
      font-family: 'Baguet Script', cursive;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: #fff;
    }

    .navlinks {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .navlinks a {
      text-decoration: none;
      color: #e86e8e;
      /* Muted sweet pink */
      font-weight: 800;
      padding: 8px 12px;
      border-radius: 12px;
      transition: all 0.2s;
    }

    .navlinks a:hover {
      background: #fce4ec;
      /* Very light pink hover */
      color: #d81b60;
    }

    .cartBadge {
      display: inline-block;
      min-width: 22px;
      padding: 2px 7px;
      margin-left: 6px;
      border-radius: 999px;
      background: #f48fb1;
      /* Cute soft pink */
      color: #fff;
      font-weight: bold;
      font-size: 12px;
      text-align: center;
      vertical-align: middle;
      box-shadow: 0 2px 5px rgba(244, 143, 177, 0.4);
    }

    .rightInfo {
      font-weight: 800;
      color: #5d4037;
      /* Mocha brown */
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .logoutBtn {
      border: none;
      background: #5d4037;
      /* Mocha brown */
      color: #fffaf0;
      /* Creme text */
      padding: 8px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.2s;
    }

    .logoutBtn:hover {
      background: #8d6e63;
      /* Lighter mocha hover */
    }

    .frameWrap {
      height: calc(100% - 72px);
      padding: 14px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 14px;
      background: #fffaf0;
      /* Creme */
      box-shadow: 0 10px 25px rgba(248, 187, 208, 0.3);
      /* Soft pinkish shadow */
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
      <span>Fradels Bakers</span>
    </div>

    <div class="navlinks">
      <a href="#" onclick="openInFrame('home_content.html'); return false;">Home</a>
      <a href="#" onclick="openInFrame('items.html'); return false;">Products</a>
      <a href="#" onclick="openInFrame('contact.html'); return false;">Contact </a>
      <a href="#" onclick="openInFrame('aboutus.html'); return false;">About Us</a>
      <a href="#" onclick="openInFrame('cart.html'); return false;">
        Cart <span id="cartCount" class="cartBadge">0</span>
      </a>
    </div>

    <div class="rightInfo">
      <span>Hi, <span id="usernameDisplay">Guest</span></span>
      <button class="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="frameWrap">
    <iframe id="contentFrame" src="home_content.html" title="Fradels Bakers"></iframe>
  </div>

  <script>
    function getCart() {
      const data = localStorage.getItem("cart");
      return data ? JSON.parse(data) : [];
    }

    // called by iframe pages after cart changes
    function updateCartBadge() {
      const cart = getCart();
      const count = cart.reduce((sum, item) => sum + (item.qty || 0), 0);
      document.getElementById("cartCount").innerText = count;
    }

    function openInFrame(page) {
      document.getElementById("contentFrame").src = page;
      const url = new URL(window.location.href);
      url.searchParams.set("page", page);
      history.replaceState(null, "", url.toString());
    }

    function logout() {
      localStorage.removeItem("currentUser");
      window.location.href = "main.html";
    }

    (function init() {
      const data = localStorage.getItem("currentUser");
      if (data) {
        const user = JSON.parse(data);
        document.getElementById("usernameDisplay").innerText = user.username;
      }
      updateCartBadge();

      const params = new URLSearchParams(window.location.search);
      const page = params.get("page");
      if (page) {
        openInFrame(page);
      }
    })();
  </script>

</body>

</html>
